<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo Lockups" subtitle="Light / dark / horizontal / palette" viewport="700x260" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);font-family:var(--bpc-font-sans);}
  body{padding:20px;box-sizing:border-box;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:center;justify-items:center;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;}
  .box{background:#F9F8F7;border:1px solid rgba(24,24,24,0.08);display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:1;}
  .box.dark{background:var(--bpc-charcoal);border-color:var(--bpc-charcoal);}
  .box.oat{background:var(--bpc-oat);border-color:transparent;}
  .box img{max-width:70%;max-height:70%;}
  .t{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--bpc-fg-3);}
</style></head><body>
<div class="cell"><div class="box"><img src="../assets/logos/BPC_LOGOLOCKUP_BLACK.svg"></div><span class="t">Lockup · light bg</span></div>
<div class="cell"><div class="box dark"><img src="../assets/logos/BPC_LOGOLOCKUP_BLACK.svg" style="filter:invert(1);"></div><span class="t">Lockup · dark bg</span></div>
<div class="cell"><div class="box"><img src="../assets/logos/BPC_HORIZONTALLOGO_BLACK.svg"></div><span class="t">Horizontal</span></div>
<div class="cell"><div class="box oat"><img src="../assets/logos/BPC_LOGOLOCKUP_O.svg"></div><span class="t">Oat palette</span></div>
</body></html>
