<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Corner Radii" subtitle="Hard edges dominate" viewport="700x200" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);font-family:var(--bpc-font-sans);}
  body{padding:22px 28px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:end;}
  .item{display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
  .box{width:64px;height:64px;background:var(--bpc-oat);border:1px solid var(--bpc-charcoal);}
  .tok{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--bpc-fg-3);}
  .name{font-size:11px;font-weight:500;}
  h4{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--bpc-fg-3);font-weight:500;margin:0 0 14px;}
</style></head><body>
<h4>Radii — hard edges dominate; softness used sparingly</h4>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:0;"></div><div class="name">None</div><div class="tok">0px · cards, hero</div></div>
  <div class="item"><div class="box" style="border-radius:2px;"></div><div class="name">Small</div><div class="tok">2px · inputs</div></div>
  <div class="item"><div class="box" style="border-radius:4px;"></div><div class="name">Medium</div><div class="tok">4px · soft UI</div></div>
  <div class="item"><div class="box" style="border-radius:999px;"></div><div class="name">Pill</div><div class="tok">999px · tags only</div></div>
</div>
</body></html>
