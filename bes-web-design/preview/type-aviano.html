<!DOCTYPE html>
<!-- @dsCard group="Type" name="Aviano Serif (Display)" subtitle="Unicase display · kerning −130" viewport="700x240" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);}
  body{padding:28px 32px;box-sizing:border-box;}
  .wrap{display:flex;align-items:flex-end;gap:28px;}
  .specimen{font-family:var(--bpc-font-serif);font-weight:300;text-transform:uppercase;letter-spacing:-0.01em;line-height:1;color:var(--bpc-charcoal);font-size:128px;}
  .meta{display:flex;flex-direction:column;gap:4px;padding-bottom:18px;}
  .name{font-family:var(--bpc-font-sans);font-weight:500;font-size:14px;color:var(--bpc-fg-1);}
  .sub{font-family:var(--bpc-font-sans);font-size:12px;color:var(--bpc-fg-3);}
  .glyph-row{display:flex;gap:24px;margin-top:18px;align-items:baseline;}
  .g{font-family:var(--bpc-font-serif);font-weight:300;text-transform:uppercase;letter-spacing:-0.01em;color:var(--bpc-charcoal);}
</style></head><body>
<div class="wrap">
  <div class="specimen">Aa</div>
  <div class="meta">
    <div class="name">Aviano Serif — Light</div>
    <div class="sub">Display / statement headline. Unicase. Kerning −130 (≈ −0.01em).</div>
    <div class="sub">Use only at large sizes; legibility is poor at small.</div>
  </div>
</div>
<div class="glyph-row">
  <span class="g" style="font-size:28px;">BESPOKE</span>
  <span class="g" style="font-size:28px;font-weight:400;">REGULAR</span>
  <span class="g" style="font-size:28px;font-weight:700;">BOLD</span>
  <span class="g" style="font-size:28px;font-weight:900;">BLACK</span>
</div>
</body></html>
