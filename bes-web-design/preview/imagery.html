<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Imagery Style" subtitle="Residences + human appeal" viewport="700x220" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);font-family:var(--bpc-font-sans);}
  body{padding:20px;box-sizing:border-box;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .tile{position:relative;aspect-ratio:3/2;background-size:cover;background-position:center;border-radius:2px;overflow:hidden;}
  .tile::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(24,24,24,0) 55%, rgba(24,24,24,0.45));}
  .cap{position:absolute;left:12px;bottom:10px;color:#fff;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;z-index:2;}
</style></head><body>
<div class="tile" style="background-image:url('../assets/imagery/house_JLeung.jpg');"><span class="cap">Residence</span></div>
<div class="tile" style="background-image:url('../assets/imagery/JaneDain.jpg');"><span class="cap">Human appeal</span></div>
<div class="tile" style="background-image:url('../assets/imagery/drake.jpg');"><span class="cap">Interior</span></div>
</body></html>
