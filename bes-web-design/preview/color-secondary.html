<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Secondary (Warm Browns)" subtitle="Espresso · Latte · Oat" viewport="700x220" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);font-family:var(--bpc-font-sans);}
  body{padding:24px 28px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .c{display:flex;flex-direction:column;gap:8px;}
  .sw{height:96px;border-radius:2px;border:1px solid var(--bpc-border-hairline);}
  .name{font-size:12px;font-weight:500;}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--bpc-fg-3);}
  .note{font-size:11px;color:var(--bpc-fg-3);margin-top:10px;letter-spacing:0.04em;}
</style></head><body>
<div class="grid">
  <div class="c"><div class="sw" style="background:#3a2f2b;"></div><div class="name">Espresso</div><div class="hex">#3a2f2b</div></div>
  <div class="c"><div class="sw" style="background:#987f6a;"></div><div class="name">Latte</div><div class="hex">#987f6a</div></div>
  <div class="c"><div class="sw" style="background:#d9d1c7;"></div><div class="name">Oat</div><div class="hex">#d9d1c7</div></div>
</div>
<div class="note">Never combine Charcoal + Espresso in the same composition — pick one as the dark.</div>
</body></html>
