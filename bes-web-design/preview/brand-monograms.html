<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Monogram / Box" subtitle="Script B · box · cutout" viewport="700x220" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);font-family:var(--bpc-font-sans);}
  body{padding:26px;box-sizing:border-box;display:flex;gap:26px;align-items:center;justify-content:center;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .iso{width:120px;height:120px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(24,24,24,0.1);background:#F9F8F7;box-sizing:border-box;padding:0;}
  .iso.dark{background:var(--bpc-charcoal);border-color:var(--bpc-charcoal);}
  .iso img{width:60%;height:60%;object-fit:contain;display:block;}
  .iso.dark img{filter:invert(1);}
  .t{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--bpc-fg-3);}
</style></head><body>
<div class="cell"><div class="iso"><img src="../assets/logos/BPC_LOGOISO_BLACK.svg"></div><span class="t">Script B · black</span></div>
<div class="cell"><div class="iso dark"><img src="../assets/logos/BPC_LOGOISO_BLACK.svg"></div><span class="t">Script B · white</span></div>
<div class="cell"><div class="iso dark"><img src="../assets/logos/BPC_LOGOISO_BLACK.svg"></div><span class="t">Box · black</span></div>
<div class="cell"><div class="iso dark"><img src="../assets/logos/BPC_LOGOISO_BLACK.svg"></div><span class="t">Box · cutout</span></div>
</body></html>
