<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="4px base · 4 → 128" viewport="700x200" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);font-family:var(--bpc-font-sans);}
  body{padding:22px 28px;box-sizing:border-box;}
  .scale{display:flex;align-items:flex-end;gap:10px;}
  .unit{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
  .bar{background:var(--bpc-charcoal);border-radius:1px;width:18px;}
  .tok{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--bpc-fg-3);}
  .px{font-size:10px;color:var(--bpc-fg-1);font-weight:500;}
</style></head><body>
<div class="scale">
  <div class="unit"><div class="bar" style="height:4px;"></div><span class="px">4</span><span class="tok">--space-1</span></div>
  <div class="unit"><div class="bar" style="height:8px;"></div><span class="px">8</span><span class="tok">--space-2</span></div>
  <div class="unit"><div class="bar" style="height:12px;"></div><span class="px">12</span><span class="tok">--space-3</span></div>
  <div class="unit"><div class="bar" style="height:16px;"></div><span class="px">16</span><span class="tok">--space-4</span></div>
  <div class="unit"><div class="bar" style="height:24px;"></div><span class="px">24</span><span class="tok">--space-5</span></div>
  <div class="unit"><div class="bar" style="height:32px;"></div><span class="px">32</span><span class="tok">--space-6</span></div>
  <div class="unit"><div class="bar" style="height:48px;"></div><span class="px">48</span><span class="tok">--space-7</span></div>
  <div class="unit"><div class="bar" style="height:64px;"></div><span class="px">64</span><span class="tok">--space-8</span></div>
  <div class="unit"><div class="bar" style="height:96px;"></div><span class="px">96</span><span class="tok">--space-9</span></div>
  <div class="unit"><div class="bar" style="height:128px;"></div><span class="px">128</span><span class="tok">--space-10</span></div>
</div>
</body></html>
