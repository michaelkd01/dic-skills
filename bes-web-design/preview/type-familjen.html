<!DOCTYPE html>
<!-- @dsCard group="Type" name="Familjen Grotesk (Workhorse)" subtitle="Variable 400–700 · body & UI" viewport="700x240" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bpc-bg-1);}
  body{padding:28px 32px;box-sizing:border-box;font-family:var(--bpc-font-sans);}
  .row{display:flex;align-items:flex-end;gap:28px;}
  .specimen{font-family:var(--bpc-font-sans);font-weight:600;line-height:1;color:var(--bpc-charcoal);font-size:120px;letter-spacing:-0.02em;}
  .meta{display:flex;flex-direction:column;gap:4px;padding-bottom:14px;}
  .name{font-weight:500;font-size:14px;}
  .sub{font-size:12px;color:var(--bpc-fg-3);}
  .weights{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap;}
  .w{display:flex;flex-direction:column;gap:2px;}
  .w .big{font-size:22px;letter-spacing:-0.01em;}
  .w .tag{font-size:10px;color:var(--bpc-fg-3);letter-spacing:0.14em;text-transform:uppercase;}
</style></head><body>
<div class="row">
  <div class="specimen">Aa</div>
  <div class="meta">
    <div class="name">Familjen Grotesk — Variable (400–700)</div>
    <div class="sub">Workhorse sans. Body, UI, navigation, headlines.</div>
    <div class="sub">Italic variable also available.</div>
  </div>
</div>
<div class="weights">
  <div class="w"><span class="big" style="font-weight:400;">Regular 400</span><span class="tag">Body</span></div>
  <div class="w"><span class="big" style="font-weight:500;">Medium 500</span><span class="tag">UI</span></div>
  <div class="w"><span class="big" style="font-weight:600;">Semibold 600</span><span class="tag">Headings</span></div>
  <div class="w"><span class="big" style="font-weight:700;">Bold 700</span><span class="tag">H1</span></div>
  <div class="w"><span class="big" style="font-weight:500;font-style:italic;">Italic</span><span class="tag">Emphasis</span></div>
</div>
</body></html>
